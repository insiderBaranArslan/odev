<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google!</title>
    <style>
      body {
        margin: 0;
        padding: 20px;
        font-family: serif;
        background-color: #fff;
      }
      .top-bar {
        text-align: right;
        font-size: 18px;
        margin-bottom: 20px;
      }
      .main {
        text-align: center;
      }
      .logo {
        width: 300px;
        margin: 40px 0 20px;
      }
      .alpha {
        color: #CC0000;
        font-weight: bold;
      }
      .search-text {
        font-size: 16px;
        margin-bottom: 20px;
      }
      .search-box {
        width: 400px;
        padding: 4px;
        font-size: 16px;
      }
      .buttons {
        margin-top: 16px;
      }
      .links {
        font-size: 14px;
        margin-top: 20px;
      }
      .links a {
        color: #0000EE;
      }
      .separator {
        margin: 0 4px;
      }
      .info {
        font-size: 14px;
        margin-top: 20px;
      }
      .index-info {
        font-size: 14px;
        color: #696969;
        margin-top: 20px;
      }
      .footer-links {
        font-size: 14px;
        margin-top: 40px;
      }
      .footer-links a {
        color: #0000EE;
      }
      .copyright {
        font-size: 12px;
        color: #696969;
        margin-top: 16px;
      }
    </style>
</head>
<body>

    <div class="top-bar">
      <a href="https://web.archive.org/web/19981202230410/http://www.google.com/about.html">About Google!</a>
    </div>

    <div class="main">
      <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/0a/Google_1998_logo.svg/1200px-Google_1998_logo.svg.png" alt="Google!">
      <p class="search-text">
        <span class="alpha">ALPHA</span> Search the web using Google!
      </p>

      <form>
        <input class="search-box" type="text" name="q" maxlength="256">
        <div class="buttons">
          <input type="submit" value="Google Search">
          <input type="submit" value="I'm feeling lucky">
        </div>
      </form>
      <p class="links">
        <a href="https://web.archive.org/web/19981202230410/http://www.google.com/search.html">Special Searches</a>
        <span class="separator">|</span>
        <a href="https://web.archive.org/web/19981202230410/http://www.google.com/options.html">Help!</a>
      </p>
      <p class="info">
        Get Google! updates monthly!<br>
        <a href="https://web.archive.org/web/19981202230410/http://www.google.com/subscribe.html">Subscribe</a>
        - your email will be kept private
      </p>
      <p class="index-info">
        Index contains ~25 million pages (soon to be much bigger)
      </p>
      <p class="footer-links">
        <a href="https://web.archive.org/web/19981202230410/http://www.google.com/company.html">Company Info</a>
        <span class="separator">|</span>
        <a href="https://web.archive.org/web/19981202230410/http://www.google.com/rgroups.html">Google! in Usenet</a>
        <span class="separator">|</span>
        <a href="https://web.archive.org/web/19981202230410/http://www.google.com/why.html">Why use Google!</a>
      </p>
      <p class="copyright">
        &copy;Copyright 1998 Google Inc.
      </p>

    </div>

</body>
</html>
