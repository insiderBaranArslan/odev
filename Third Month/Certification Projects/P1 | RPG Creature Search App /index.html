<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RPG Creature Search</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <h1 class="title">RPG Creature Search</h1>

      <div class="search-box">
        <input
          type="text"
          id="search-input"
          placeholder="Enter name or ID..."
          required
        />
        <button id="search-button">Search</button>
      </div>

      <div class="card" id="card">
        <div class="card-header">
          <span id="creature-name"></span>
          <span id="creature-id"></span>
        </div>

        <div class="sprite-container">
          <img id="creature-sprite" src="" alt="" />
        </div>

        <div class="info-row">
          <span id="weight"></span>
          <span id="height"></span>
        </div>

        <div id="types" class="types"></div>

        <table class="stats-table">
          <thead>
            <tr>
              <th>Stat</th>
              <th>Value</th>
            </tr>
          </thead>
          <tbody>
            <tr><td>HP</td><td id="hp"></td></tr>
            <tr><td>Attack</td><td id="attack"></td></tr>
            <tr><td>Defense</td><td id="defense"></td></tr>
            <tr><td>Special Attack</td><td id="special-attack"></td></tr>
            <tr><td>Special Defense</td><td id="special-defense"></td></tr>
            <tr><td>Speed</td><td id="speed"></td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
